<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Portfolio RAG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0c0e;
    --bg2:       #111318;
    --bg3:       #181b22;
    --border:    #272b36;
    --border2:   #323848;
    --amber:     #f0a030;
    --amber-dim: #a06820;
    --amber-glow:#f0a03022;
    --green:     #3ddc84;
    --green-dim: #1a7a40;
    --red:       #ff5c6a;
    --blue:      #5b9cf6;
    --text:      #d4d8e8;
    --text-dim:  #6b7280;
    --text-mid:  #9aa0b4;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --radius:    4px;
    --header-h:  48px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.6;
    overflow: hidden;
  }

  /* DESKTOP LAYOUT */
  #app {
    display: grid;
    grid-template-rows: var(--header-h) 1fr;
    grid-template-columns: 1fr 340px;
    grid-template-areas:
      "header header"
      "center right";
    height: 100vh;
    height: 100dvh;
  }

  /* Header */
  #header {
    grid-area: header;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    z-index: 10;
  }
  .logo {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    white-space: nowrap;
  }
  .logo span { color: var(--text-dim); font-weight: 300; }

  #header-right {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
  }
  .stat-pill {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    gap: 5px;
    align-items: center;
    white-space: nowrap;
  }
  .stat-pill .val { color: var(--text-mid); }
  .stat-pill.live .val { color: var(--green); }

  /* Mobile chunks button — hidden on desktop */
  #btn-chunks-toggle {
    display: none;
    align-items: center;
    gap: 5px;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 5px 9px;
    border-radius: var(--radius);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  #btn-chunks-toggle:active { opacity: 0.7; }
  #btn-chunks-toggle .badge {
    background: var(--blue);
    color: #0b0c0e;
    font-size: 9px;
    font-weight: 700;
    padding: 0 4px;
    border-radius: 2px;
    min-width: 16px;
    text-align: center;
  }

  /* Center */
  #center {
    grid-area: center;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    background: var(--bg);
    overflow: hidden;
    min-width: 0;
  }

  /* Query bar */
  #query-bar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg2);
  }
  #query-row { display: flex; gap: 8px; }

  #query-input {
    flex: 1;
    min-width: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 16px; /* prevents iOS zoom */
    padding: 9px 12px;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  @media (min-width: 480px) { #query-input { font-size: 13px; } }
  #query-input:focus { border-color: var(--amber-dim); box-shadow: 0 0 0 2px var(--amber-glow); }
  #query-input::placeholder { color: var(--text-dim); }

  /* Scrollable filter row */
  #filter-row {
    display: flex;
    gap: 6px;
    align-items: center;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
  }
  #filter-row::-webkit-scrollbar { display: none; }
  #filter-row label {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #filter-row select,
  #filter-row input[type="number"] {
    flex-shrink: 0;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 8px;
    border-radius: var(--radius);
    outline: none;
    -webkit-appearance: none;
    cursor: pointer;
  }
  #filter-row select:focus, #filter-row input:focus { border-color: var(--amber-dim); }
  #cfg-topk { width: 50px; }
  select option { background: var(--bg3); }

  /* System prompt */
  #prompt-row { margin-top: 2px; }
  #cfg-system-prompt {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.55;
    padding: 8px 10px;
    border-radius: var(--radius);
    outline: none;
    resize: vertical;
    min-height: 90px;
    transition: border-color 0.15s;
  }
  #cfg-system-prompt:focus { border-color: var(--amber-dim); box-shadow: 0 0 0 2px var(--amber-glow); }

  .btn-prompt-toggle {
    flex-shrink: 0;
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 4px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-prompt-toggle:hover { border-color: var(--amber-dim); color: var(--amber); }
  .btn-prompt-toggle.active { border-color: var(--amber-dim); color: var(--amber); background: var(--amber-glow); }

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 9px 16px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    min-height: 40px;
  }
  .btn-primary { background: var(--amber); color: #0b0c0e; border-color: var(--amber); }
  .btn-primary:hover { background: #fdb040; }
  .btn-primary:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Answer pane */
  #answer-pane {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
    -webkit-overflow-scrolling: touch;
  }
  .answer-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 24px;
  }
  .answer-empty .big { font-size: 28px; opacity: 0.2; }
  .answer-empty p { font-size: 12px; letter-spacing: 0.06em; }

  .answer-block { max-width: 720px; }
  .answer-question {
    font-size: 11px;
    color: var(--amber);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    word-break: break-word;
  }
  .answer-question::before { content: '▶'; font-size: 9px; flex-shrink: 0; margin-top: 2px; }
  .answer-text {
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.75;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .answer-text .cursor {
    display: inline-block;
    width: 2px; height: 1em;
    background: var(--amber);
    animation: blink 0.8s infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  .answer-meta {
    margin-top: 20px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--text-dim);
  }
  .answer-meta .meta-item { display: flex; gap: 6px; align-items: center; }
  .answer-meta .meta-val { color: var(--text-mid); }

  /* Progress log */
  #progress-log {
    padding: 6px 14px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    font-size: 11px;
    color: var(--text-dim);
    flex-shrink: 0;
    font-style: italic;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Right panel */
  #right {
    grid-area: right;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg2);
    border-left: 1px solid var(--border);
  }
  .panel-header {
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-header .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--blue);
    box-shadow: 0 0 6px var(--blue);
    flex-shrink: 0;
  }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
    -webkit-overflow-scrolling: touch;
  }

  /* Chunk cards */
  .chunk-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
    animation: slideIn 0.2s ease forwards;
    opacity: 0;
  }
  @keyframes slideIn {
    from { opacity:0; transform: translateX(8px); }
    to   { opacity:1; transform: translateX(0); }
  }
  .chunk-card:hover { border-color: var(--border2); }
  .chunk-head {
    padding: 8px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .chunk-rank { font-size: 10px; font-weight: 600; color: var(--amber); flex-shrink: 0; margin-top: 1px; }
  .chunk-meta { flex: 1; min-width: 0; }
  .chunk-title {
    font-size: 11px; color: var(--text); font-weight: 500;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .chunk-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .tag { font-size: 10px; padding: 1px 6px; border-radius: 2px; font-weight: 500; letter-spacing: 0.04em; }
  .tag-section { background: #5b9cf622; color: var(--blue); }
  .tag-type    { background: #3ddc8422; color: var(--green); }
  .tag-type.video { background: #f0a03022; color: var(--amber); }
  .tag-type.index { background: #9b59f622; color: #c085ff; }
  .chunk-score { font-size: 11px; color: var(--text-dim); flex-shrink: 0; font-family: var(--mono); }
  .score-bar { width: 44px; height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; }
  .score-fill { height: 100%; background: var(--amber); border-radius: 2px; transition: width 0.4s ease; }
  .chunk-body {
    padding: 10px; font-size: 11px; color: var(--text-mid);
    line-height: 1.6; max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .chunk-body.open { max-height: 220px; overflow-y: auto; }
  .chunk-toggle {
    width: 100%; background: none; border: none;
    border-top: 1px solid var(--border); color: var(--text-dim);
    font-size: 10px; font-family: var(--mono); letter-spacing: 0.08em;
    padding: 7px; cursor: pointer; text-align: center;
    transition: color 0.15s, background 0.15s;
    min-height: 34px;
    -webkit-tap-highlight-color: transparent;
  }
  .chunk-toggle:hover { background: var(--border); color: var(--text); }
  .chunks-empty { font-size: 12px; color: var(--text-dim); text-align: center; padding: 40px 0; font-style: italic; }

  /* ═══════════════════════════════
     MOBILE  (< 768px)
  ═══════════════════════════════ */
  @media (max-width: 767px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-areas:
        "header"
        "center";
    }

    /* Bottom sheet */
    #right {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 72vh;
      border-left: none;
      border-top: 2px solid var(--border2);
      border-radius: 14px 14px 0 0;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 100;
      box-shadow: 0 -12px 48px #00000090;
    }
    #right.open { transform: translateY(0); }

    /* Drag handle above panel header */
    #right::before {
      content: '';
      display: block;
      width: 40px; height: 4px;
      background: var(--border2);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    /* Dim overlay */
    #sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #00000070;
      z-index: 99;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);
    }
    #sheet-overlay.open { display: block; }

    #btn-chunks-toggle { display: inline-flex; }

    /* Hide stat pills to free header space */
    .stat-pill:not(#server-status) { display: none; }

    #query-bar { padding: 10px 12px; gap: 8px; }
    #answer-pane { padding: 16px 14px 16px; }
    .answer-text { font-size: 14px; }
  }

  /* SMALL PHONES (< 400px) */
  @media (max-width: 399px) {
    .logo { font-size: 11px; letter-spacing: 0.1em; }
    #filter-row select { max-width: 80px; }
    .answer-text { font-size: 13px; }
  }

  /* Toasts */
  #toast {
    position: fixed; bottom: 24px; right: 16px; z-index: 200;
    display: flex; flex-direction: column; gap: 8px; pointer-events: none;
  }
  @media (max-width: 767px) { #toast { bottom: 80px; left: 16px; right: 16px; } }
  .toast-msg {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); font-size: 12px; padding: 10px 14px;
    border-radius: var(--radius); animation: toastIn 0.2s ease;
    display: flex; gap: 8px; align-items: center;
    box-shadow: 0 4px 20px #00000060;
  }
  @media (max-width: 767px) { .toast-msg { max-width: 100%; } }
  @keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
  .toast-msg.success { border-color: var(--green-dim); }
  .toast-msg.error   { border-color: #ff5c6a55; }
  .toast-msg.info    { border-color: var(--amber-dim); }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .spinner {
    display: inline-block; width: 10px; height: 10px;
    border: 2px solid var(--border2); border-top-color: var(--amber);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="sheet-overlay" onclick="closeChunks()"></div>

<div id="app">

  <!-- Header -->
  <header id="header">
    <div class="logo">Portfolio<span>.RAG</span></div>
    <div id="header-right">
      <div id="server-status" class="stat-pill">
        <span class="val" id="server-status-text">connecting…</span>
      </div>
      <div class="stat-pill"><span>chunks</span><span class="val" id="stat-chunks">—</span></div>
      <div class="stat-pill"><span>docs</span><span class="val" id="stat-docs">—</span></div>
      <button id="btn-chunks-toggle" onclick="openChunks()">
        ◈ chunks <span class="badge" id="mobile-chunk-badge">0</span>
      </button>
    </div>
  </header>

  <!-- Center -->
  <main id="center">
    <div id="query-bar">
      <div id="query-row">
        <input id="query-input" type="text"
               placeholder="Ask about the portfolio…"
               onkeydown="if(event.key==='Enter')runQuery()"/>
        <button class="btn btn-primary" id="btn-query" onclick="runQuery()">
          <span id="query-btn-label">Ask</span>
          <span id="query-spinner" class="spinner hidden"></span>
        </button>
      </div>

      <div id="prompt-row" class="hidden">
        <textarea id="cfg-system-prompt" rows="5" spellcheck="false"></textarea>
      </div>

      <div id="filter-row">
        <label>model</label>
        <select id="cfg-gemini-model">
          <option value="gemini-3-flash-preview">3 flash</option>
          <option value="gemini-2.5-flash-preview-04-17">2.5 flash</option>
          <option value="gemini-3.1-pro-preview">3.1 pro</option>
        </select>
        <label>section</label>
        <select id="cfg-section">
          <option value="">all</option>
          <option value="biography">biography</option>
          <option value="video">video</option>
          <option value="opinion">opinion</option>
          <option value="employment">employment</option>
          <option value="education">education</option>
          <option value="advisor">advisor</option>
          <option value="cases">cases</option>
          <option value="research">research</option>
          <option value="associate_editor">assoc. editor</option>
          <option value="contact">contact</option>
          <option value="executive_teaching">exec. teaching</option>
          <option value="research_in_progress">research WIP</option>
          <option value="working_papers">working papers</option>
          <option value="fame">fame</option>
          <option value="general">general</option>
        </select>
        <label>type</label>
        <select id="cfg-doctype">
          <option value="">all</option>
          <option value="index">index</option>
          <option value="text">text</option>
          <option value="video_summary">video</option>
        </select>
        <label>top-k</label>
        <input type="number" id="cfg-topk" value="6" min="1" max="20"/>
        <button class="btn-prompt-toggle" id="btn-prompt-toggle" onclick="togglePrompt()">⟨/⟩ prompt</button>
      </div>
    </div>

    <div id="answer-pane">
      <div class="answer-empty" id="answer-empty">
        <div class="big">◈</div>
        <p>Ask a question to get started.</p>
      </div>
      <div class="answer-block hidden" id="answer-block">
        <div class="answer-question" id="answer-question"></div>
        <div class="answer-text" id="answer-text"></div>
        <div class="answer-meta" id="answer-meta"></div>
      </div>
    </div>

    <div id="progress-log">Ready.</div>
  </main>

  <!-- Right / Bottom sheet: Chunks -->
  <aside id="right">
    <div class="panel-header" id="sheet-handle">
      <span class="dot"></span>
      Retrieved Chunks
      <span id="chunk-count" style="margin-left:auto;color:var(--text-dim);font-size:10px"></span>
    </div>
    <div class="panel-body" id="chunks-pane">
      <div class="chunks-empty">Chunks will appear after a query.</div>
    </div>
  </aside>

</div>
<div id="toast"></div>

<script>
const API = 'https://profile-rag.onrender.com';

const SYSTEM_PROMPT = `You are Bhagwan Choudary. Answer questions related to your portfolio.
Some stuff about you:
Bhagwan Chowdhry is a Professor of Finance at the Indian School of Business and Research Professor at UCLA Anderson where he has held an appointment since 1988. He is the Executive Director, Digital Identity Research Initiative (DIRI), and Faculty Director, I-Venture @ ISB.

Professor Chowdhry has also taught at the University of Chicago, University of Illinois at Chicago, and the Hong Kong University of Science and Technology. He received his Ph.D. from the University of Chicago Booth School of Business. He has an M.B.A. in Finance from the University of Iowa and a B.Tech. in Mechanical Engineering from Indian Institute of Technology, Kanpur.

His research interests are in International Finance, Corporate Finance, Impact Investing, and FinTech. Professor Chowdhry is an Advisor to several FinTech start-ups.

He has written a book with his colleague Anas Ahmed at DIRI, FinTech for Billions: Simple, Human, Ubiquitous.

Professor Chowdhry has proposed Financial Access at Birth (FAB) initiative in which every child born in the world is given an initial deposit of $100 in an online bank account.

Rules:
- Answer ONLY from the provided context.
- If the answer is not in context, say so clearly. Do not use the word "context" in your responses.
- Be concise but complete.`;

// Mobile sheet
function isMobile() { return window.innerWidth < 768; }
function openChunks() {
  document.getElementById('right').classList.add('open');
  document.getElementById('sheet-overlay').classList.add('open');
}
function closeChunks() {
  document.getElementById('right').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
}

// Tap header to close on mobile
document.getElementById('sheet-handle').addEventListener('click', () => {
  if (isMobile()) closeChunks();
});

// Swipe down to close
(function(){
  let startY = 0;
  const sheet = document.getElementById('right');
  sheet.addEventListener('touchstart', e => { startY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 60) closeChunks();
  }, { passive: true });
})();

// Stats
async function refreshStats() {
  try {
    const r = await fetch(`${API}/stats`);
    if (!r.ok) { setServerStatus(false); return; }
    const s = await r.json();
    setServerStatus(true);
    document.getElementById('stat-chunks').textContent = s.total_chunks ?? '—';
    document.getElementById('stat-docs').textContent   = s.total_documents ?? '—';
  } catch { setServerStatus(false); }
}
function setServerStatus(ok) {
  const el = document.getElementById('server-status-text');
  const pill = document.getElementById('server-status');
  el.textContent = ok ? '● online' : '○ offline';
  pill.classList.toggle('live', ok);
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
}

// Prompt toggle
function togglePrompt() {
  const row = document.getElementById('prompt-row');
  const btn = document.getElementById('btn-prompt-toggle');
  const hidden = row.classList.toggle('hidden');
  btn.classList.toggle('active', !hidden);
}

// Query
function setQueryBusy(busy) {
  document.getElementById('btn-query').disabled   = busy;
  document.getElementById('query-input').disabled = busy;
  document.getElementById('query-btn-label').textContent = busy ? '…' : 'Ask';
  document.getElementById('query-spinner').classList.toggle('hidden', !busy);
}

async function runQuery() {
  const question = document.getElementById('query-input').value.trim();
  if (!question) return;
  document.getElementById('query-input').blur(); // dismiss keyboard on mobile
  setQueryBusy(true);
  clearChunks();
  showAnswerBlock(question);
  log('Retrieving chunks…');

  const params = new URLSearchParams({
    question,
    top_k:         document.getElementById('cfg-topk').value,
    gemini_model:  document.getElementById('cfg-gemini-model').value,
    system_prompt: document.getElementById('cfg-system-prompt').value.trim() || SYSTEM_PROMPT,
    ...(document.getElementById('cfg-section').value  && { section_filter:  document.getElementById('cfg-section').value }),
    ...(document.getElementById('cfg-doctype').value  && { doc_type_filter: document.getElementById('cfg-doctype').value }),
  });

  const textEl = document.getElementById('answer-text');
  textEl.innerHTML = '<span class="cursor"></span>';
  let fullText = '';

  try {
    const es = new EventSource(`${API}/query/stream?${params}`);

    es.addEventListener('chunk', e => { renderChunk(JSON.parse(e.data)); });

    es.addEventListener('token', e => {
      fullText += JSON.parse(e.data);
      textEl.innerHTML = escapeHtml(fullText) + '<span class="cursor"></span>';
      document.getElementById('answer-pane').scrollTop = 999999;
    });

    es.addEventListener('done', e => {
      const meta = JSON.parse(e.data);
      textEl.innerHTML = escapeHtml(fullText);
      renderAnswerMeta(meta);
      log(`Done — ${meta.tokens_used ?? '?'} tokens used.`);
      setQueryBusy(false);
      es.close();
      if (isMobile() && chunkCount > 0) {
        const btn = document.getElementById('btn-chunks-toggle');
        btn.style.borderColor = 'var(--blue)';
        btn.style.color = 'var(--blue)';
      }
    });

    es.addEventListener('error', e => {
      const msg = e.data ? JSON.parse(e.data) : 'Stream error';
      toast(msg, 'error');
      log('Error: ' + msg);
      textEl.innerHTML = escapeHtml(fullText);
      setQueryBusy(false);
      es.close();
    });

    es.onerror = () => {
      if (es.readyState === EventSource.CLOSED) return;
      toast('Connection lost', 'error');
      setQueryBusy(false);
      es.close();
    };
  } catch(e) {
    toast('Query failed: ' + e.message, 'error');
    setQueryBusy(false);
  }
}

// Chunks
let chunkCount = 0;
function clearChunks() {
  chunkCount = 0;
  document.getElementById('chunks-pane').innerHTML = '<div class="chunks-empty">Retrieving…</div>';
  document.getElementById('chunk-count').textContent = '';
  document.getElementById('mobile-chunk-badge').textContent = '0';
  const btn = document.getElementById('btn-chunks-toggle');
  btn.style.borderColor = '';
  btn.style.color = '';
}

function renderChunk(c) {
  const pane = document.getElementById('chunks-pane');
  if (chunkCount === 0) pane.innerHTML = '';
  chunkCount++;
  document.getElementById('chunk-count').textContent = `${chunkCount}`;
  document.getElementById('mobile-chunk-badge').textContent = chunkCount;

  const typeClass = c.doc_type === 'video_summary' ? 'video' : c.doc_type === 'index' ? 'index' : '';
  const scorePct  = Math.round(Math.min(c.score, 1) * 100);
  const card = document.createElement('div');
  card.className = 'chunk-card';
  card.style.animationDelay = `${(chunkCount - 1) * 60}ms`;
  card.innerHTML = `
    <div class="chunk-head">
      <div class="chunk-rank">#${c.rank}</div>
      <div class="chunk-meta">
        <div class="chunk-title" title="${escapeAttr(c.doc_title)}">${escapeHtml(c.doc_title)}</div>
        <div class="chunk-tags">
          <span class="tag tag-section">${escapeHtml(c.section)}</span>
          <span class="tag tag-type ${typeClass}">${escapeHtml(c.doc_type)}</span>
        </div>
      </div>
      <div>
        <div class="chunk-score">${c.score.toFixed(3)}</div>
        <div class="score-bar"><div class="score-fill" style="width:${scorePct}%"></div></div>
      </div>
    </div>
    <div class="chunk-body" id="cb-${chunkCount}">${escapeHtml(c.raw_content)}</div>
    <button class="chunk-toggle" onclick="toggleChunk(${chunkCount})">▾ show content</button>
  `;
  pane.appendChild(card);
}

function toggleChunk(n) {
  const body = document.getElementById(`cb-${n}`);
  const open = body.classList.toggle('open');
  body.nextElementSibling.textContent = open ? '▴ hide' : '▾ show content';
}

function showAnswerBlock(question) {
  document.getElementById('answer-empty').classList.add('hidden');
  document.getElementById('answer-block').classList.remove('hidden');
  document.getElementById('answer-question').textContent = question;
  document.getElementById('answer-meta').innerHTML = '';
}

function renderAnswerMeta(meta) {
  const sources = (meta.sources || [])
    .map(s => `<a href="${escapeAttr(s.doc_url||'#')}" target="_blank"
                  style="color:var(--blue);text-decoration:none"
                  title="${escapeAttr(s.doc_title)}">[${s.doc_index}]</a>`).join(' ');
  document.getElementById('answer-meta').innerHTML = `
    <div class="meta-item"><span>tokens</span><span class="meta-val">${meta.tokens_used ?? '—'}</span></div>
    <div class="meta-item"><span>sources</span><span class="meta-val">${sources || '—'}</span></div>
  `;
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = `${type==='success'?'✓':type==='error'?'✕':'◈'}  ${msg}`;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3800);
}
function log(msg) { document.getElementById('progress-log').textContent = msg; }
function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(s) { return String(s||'').replace(/"/g,'&quot;'); }

document.getElementById('cfg-system-prompt').value = SYSTEM_PROMPT;
refreshStats();
setInterval(refreshStats, 8000);
</script>
