<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Portfolio RAG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b0c0e;
    --bg2:       #111318;
    --bg3:       #181b22;
    --border:    #272b36;
    --border2:   #323848;
    --amber:     #f0a030;
    --amber-dim: #a06820;
    --amber-glow:#f0a03022;
    --green:     #3ddc84;
    --green-dim: #1a7a40;
    --red:       #ff5c6a;
    --blue:      #5b9cf6;
    --text:      #d4d8e8;
    --text-dim:  #6b7280;
    --text-mid:  #9aa0b4;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
    --radius:    6px;
    --header-h:  48px;
  }

  html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--mono); font-size:13px; line-height:1.6; overflow:hidden; }

  #app {
    display:grid;
    grid-template-rows:var(--header-h) 1fr;
    grid-template-columns:1fr 320px;
    grid-template-areas:"header header" "center right";
    height:100vh; height:100dvh;
  }

  /* Header */
  #header { grid-area:header; display:flex; align-items:center; gap:12px; padding:0 16px; border-bottom:1px solid var(--border); background:var(--bg); z-index:10; }
  .logo { font-size:12px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--amber); white-space:nowrap; }
  .logo span { color:var(--text-dim); font-weight:300; }
  #header-right { display:flex; align-items:center; gap:10px; margin-left:auto; }
  .stat-pill { font-size:11px; color:var(--text-dim); display:flex; gap:5px; align-items:center; white-space:nowrap; }
  .stat-pill .val { color:var(--text-mid); }
  .stat-pill.live .val { color:var(--green); }
  #btn-chunks-toggle { display:none; align-items:center; gap:5px; background:transparent; border:1px solid var(--border2); color:var(--text-dim); font-family:var(--mono); font-size:10px; padding:5px 9px; border-radius:var(--radius); cursor:pointer; white-space:nowrap; transition:all 0.15s; -webkit-tap-highlight-color:transparent; }
  #btn-chunks-toggle:active { opacity:0.7; }
  #btn-chunks-toggle .badge { background:var(--blue); color:#0b0c0e; font-size:9px; font-weight:700; padding:0 4px; border-radius:2px; min-width:16px; text-align:center; }

  /* Center */
  #center { grid-area:center; display:flex; flex-direction:column; border-right:1px solid var(--border); background:var(--bg); overflow:hidden; min-width:0; }

  /* Thread */
  #thread { flex:1; overflow-y:auto; padding:20px 20px 10px; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; -webkit-overflow-scrolling:touch; display:flex; flex-direction:column; gap:18px; }
  .thread-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:var(--text-dim); text-align:center; padding:24px; }
  .thread-empty .big { font-size:28px; opacity:0.18; }
  .thread-empty p { font-size:12px; letter-spacing:0.06em; }

  /* Bubbles */
  .turn { display:flex; flex-direction:column; gap:6px; animation:fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;} }

  .bubble-user {
    align-self:flex-end; max-width:72%;
    background:var(--bg3); border:1px solid var(--border2);
    border-radius:var(--radius) var(--radius) 2px var(--radius);
    padding:10px 14px; font-family:var(--mono); font-size:12px;
    color:var(--amber); word-break:break-word;
  }
  .bubble-assistant { align-self:flex-start; max-width:90%; }
  .bubble-assistant-inner {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:2px var(--radius) var(--radius) var(--radius);
    padding:12px 16px;
  }
  .bubble-text { font-family:var(--sans); font-size:14px; line-height:1.75; color:var(--text); white-space:pre-wrap; word-break:break-word; }
  .bubble-text .cursor { display:inline-block; width:2px; height:1em; background:var(--amber); animation:blink 0.8s infinite; vertical-align:text-bottom; margin-left:2px; }
  @keyframes blink { 0%,100%{opacity:1;}50%{opacity:0;} }
  .bubble-meta { display:flex; gap:12px; flex-wrap:wrap; font-size:10px; color:var(--text-dim); margin-top:8px; }
  .bubble-meta .mi { display:flex; gap:4px; align-items:center; }
  .bubble-meta .mv { color:var(--text-mid); }

  /* Input area */
  #input-bar { display:flex; flex-direction:column; gap:7px; padding:10px 14px; border-top:1px solid var(--border); flex-shrink:0; background:var(--bg2); }

  #prompt-row { display:none; }
  #prompt-row.visible { display:block; }
  #cfg-system-prompt { width:100%; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:var(--mono); font-size:11px; line-height:1.55; padding:7px 10px; border-radius:var(--radius); outline:none; resize:vertical; min-height:80px; transition:border-color 0.15s; }
  #cfg-system-prompt:focus { border-color:var(--amber-dim); box-shadow:0 0 0 2px var(--amber-glow); }

  #filter-row { display:flex; gap:6px; align-items:center; overflow-x:auto; scrollbar-width:none; -webkit-overflow-scrolling:touch; padding-bottom:1px; }
  #filter-row::-webkit-scrollbar { display:none; }
  #filter-row label { font-size:10px; color:var(--text-dim); letter-spacing:0.08em; white-space:nowrap; flex-shrink:0; }
  #filter-row select, #filter-row input[type="number"] { flex-shrink:0; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:var(--mono); font-size:11px; padding:4px 7px; border-radius:var(--radius); outline:none; -webkit-appearance:none; cursor:pointer; }
  #filter-row select:focus, #filter-row input:focus { border-color:var(--amber-dim); }
  #cfg-topk { width:48px; }
  select option { background:var(--bg3); }

  .btn-icon { flex-shrink:0; background:transparent; border:1px solid var(--border2); color:var(--text-dim); font-family:var(--mono); font-size:10px; padding:4px 8px; border-radius:var(--radius); cursor:pointer; transition:all 0.15s; white-space:nowrap; -webkit-tap-highlight-color:transparent; }
  .btn-icon:hover { border-color:var(--amber-dim); color:var(--amber); }
  .btn-icon.active { border-color:var(--amber-dim); color:var(--amber); background:var(--amber-glow); }
  .btn-icon.danger:hover { border-color:var(--red); color:var(--red); }

  #send-row { display:flex; gap:8px; }
  #query-input { flex:1; min-width:0; background:var(--bg3); border:1px solid var(--border); color:var(--text); font-family:var(--mono); font-size:16px; padding:9px 12px; border-radius:var(--radius); outline:none; transition:border-color 0.15s; -webkit-appearance:none; }
  @media (min-width:480px) { #query-input { font-size:13px; } }
  #query-input:focus { border-color:var(--amber-dim); box-shadow:0 0 0 2px var(--amber-glow); }
  #query-input::placeholder { color:var(--text-dim); }

  .btn-send { flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:9px 16px; border-radius:var(--radius); border:none; font-family:var(--mono); font-size:12px; font-weight:500; cursor:pointer; transition:all 0.15s; white-space:nowrap; min-height:40px; background:var(--amber); color:#0b0c0e; -webkit-tap-highlight-color:transparent; }
  .btn-send:hover { background:#fdb040; }
  .btn-send:active { transform:scale(0.97); }
  .btn-send:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

  #progress-log { padding:4px 14px 0; font-size:10px; color:var(--text-dim); flex-shrink:0; font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-height:16px; }

  /* Right panel */
  #right { grid-area:right; display:flex; flex-direction:column; overflow:hidden; background:var(--bg2); border-left:1px solid var(--border); }
  .panel-header { padding:10px 14px 8px; border-bottom:1px solid var(--border); font-size:10px; font-weight:600; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); flex-shrink:0; display:flex; align-items:center; gap:8px; }
  .panel-header .dot { width:6px; height:6px; border-radius:50%; background:var(--blue); box-shadow:0 0 6px var(--blue); flex-shrink:0; }
  .panel-body { flex:1; overflow-y:auto; padding:12px; scrollbar-width:thin; scrollbar-color:var(--border2) transparent; -webkit-overflow-scrolling:touch; }

  .chunk-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:10px; overflow:hidden; animation:slideIn 0.2s ease forwards; opacity:0; }
  @keyframes slideIn { from{opacity:0;transform:translateX(8px);}to{opacity:1;transform:none;} }
  .chunk-card:hover { border-color:var(--border2); }
  .chunk-head { padding:8px 10px; display:flex; justify-content:space-between; align-items:flex-start; border-bottom:1px solid var(--border); gap:8px; }
  .chunk-rank { font-size:10px; font-weight:600; color:var(--amber); flex-shrink:0; margin-top:1px; }
  .chunk-meta { flex:1; min-width:0; }
  .chunk-title { font-size:11px; color:var(--text); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chunk-tags { display:flex; gap:4px; margin-top:4px; flex-wrap:wrap; }
  .tag { font-size:10px; padding:1px 6px; border-radius:2px; font-weight:500; }
  .tag-section { background:#5b9cf622; color:var(--blue); }
  .tag-type    { background:#3ddc8422; color:var(--green); }
  .tag-type.video { background:#f0a03022; color:var(--amber); }
  .tag-type.index { background:#9b59f622; color:#c085ff; }
  .chunk-score { font-size:11px; color:var(--text-dim); flex-shrink:0; }
  .score-bar { width:44px; height:3px; background:var(--border); border-radius:2px; margin-top:4px; }
  .score-fill { height:100%; background:var(--amber); border-radius:2px; transition:width 0.4s; }
  .chunk-body { padding:10px; font-size:11px; color:var(--text-mid); line-height:1.6; max-height:0; overflow:hidden; transition:max-height 0.3s ease; }
  .chunk-body.open { max-height:220px; overflow-y:auto; }
  .chunk-toggle { width:100%; background:none; border:none; border-top:1px solid var(--border); color:var(--text-dim); font-size:10px; font-family:var(--mono); padding:7px; cursor:pointer; text-align:center; transition:color 0.15s,background 0.15s; min-height:32px; -webkit-tap-highlight-color:transparent; }
  .chunk-toggle:hover { background:var(--border); color:var(--text); }
  .chunks-empty { font-size:12px; color:var(--text-dim); text-align:center; padding:40px 0; font-style:italic; }

  /* Mobile */
  @media (max-width:767px) {
    #app { grid-template-columns:1fr; grid-template-areas:"header" "center"; }
    #right { position:fixed; bottom:0; left:0; right:0; height:72vh; border-left:none; border-top:2px solid var(--border2); border-radius:14px 14px 0 0; transform:translateY(100%); transition:transform 0.32s cubic-bezier(0.32,0.72,0,1); z-index:100; box-shadow:0 -12px 48px #00000090; }
    #right.open { transform:translateY(0); }
    #right::before { content:''; display:block; width:40px; height:4px; background:var(--border2); border-radius:2px; margin:10px auto 0; flex-shrink:0; }
    #sheet-overlay { display:none; position:fixed; inset:0; background:#00000070; z-index:99; backdrop-filter:blur(2px); }
    #sheet-overlay.open { display:block; }
    #btn-chunks-toggle { display:inline-flex; }
    .stat-pill:not(#server-status) { display:none; }
    #thread { padding:14px 12px 8px; }
    .bubble-user { max-width:88%; }
    .bubble-assistant { max-width:100%; }
    .bubble-text { font-size:14px; }
    #input-bar { padding:8px 12px; }
  }
  @media (max-width:399px) {
    .logo { font-size:11px; }
    #filter-row select { max-width:80px; }
  }

  /* Toasts */
  #toast { position:fixed; bottom:24px; right:16px; z-index:200; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
  @media (max-width:767px) { #toast { bottom:80px; left:16px; right:16px; } }
  .toast-msg { background:var(--bg3); border:1px solid var(--border2); color:var(--text); font-size:12px; padding:10px 14px; border-radius:var(--radius); animation:toastIn 0.2s ease; display:flex; gap:8px; align-items:center; box-shadow:0 4px 20px #00000060; }
  @keyframes toastIn { from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;} }
  .toast-msg.success { border-color:var(--green-dim); }
  .toast-msg.error   { border-color:#ff5c6a55; }
  .toast-msg.info    { border-color:var(--amber-dim); }

  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
  .spinner { display:inline-block; width:10px; height:10px; border:2px solid var(--border2); border-top-color:var(--amber); border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }
  .hidden { display:none !important; }

  /* KaTeX display math */
  .bubble-text .katex-display { overflow-x:auto; padding:4px 0; }
  .latex-error { color:var(--red); font-family:var(--mono); font-size:0.85em; }
</style>
</head>
<body>

<div id="sheet-overlay" onclick="closeChunks()"></div>

<div id="app">

  <header id="header">
    <div class="logo">Portfolio<span>.RAG</span></div>
    <div id="header-right">
      <div id="server-status" class="stat-pill"><span class="val" id="server-status-text">connecting…</span></div>
      <div class="stat-pill"><span>chunks</span><span class="val" id="stat-chunks">—</span></div>
      <div class="stat-pill"><span>docs</span><span class="val" id="stat-docs">—</span></div>
      <button id="btn-chunks-toggle" onclick="openChunks()">
        ◈ chunks <span class="badge" id="mobile-chunk-badge">0</span>
      </button>
    </div>
  </header>

  <main id="center">
    <div id="thread">
      <div class="thread-empty" id="thread-empty">
        <div class="big">◈</div>
        <p>Start a conversation about the portfolio.</p>
      </div>
    </div>

    <div id="progress-log"></div>

    <div id="input-bar">
      <div id="prompt-row">
        <textarea id="cfg-system-prompt" rows="4" spellcheck="false"></textarea>
      </div>

      <div id="filter-row">
        <label>model</label>
        <select id="cfg-model">
          <optgroup label="Claude">
            <option value="claude-sonnet-4-6">Sonnet 4.6</option>
            <option value="claude-opus-4-5">Opus 4.5</option>
          </optgroup>
        </select>
        <label>section</label>
        <select id="cfg-section">
          <option value="">all</option>
          <option value="biography">biography</option>
          <option value="video">video</option>
          <option value="opinion">opinion</option>
          <option value="employment">employment</option>
          <option value="education">education</option>
          <option value="advisor">advisor</option>
          <option value="cases">cases</option>
          <option value="research">research</option>
          <option value="associate_editor">assoc. editor</option>
          <option value="contact">contact</option>
          <option value="executive_teaching">exec. teaching</option>
          <option value="research_in_progress">research WIP</option>
          <option value="working_papers">working papers</option>
          <option value="fame">fame</option>
          <option value="general">general</option>
        </select>
        <label>type</label>
        <select id="cfg-doctype">
          <option value="">all</option>
          <option value="index">index</option>
          <option value="text">text</option>
          <option value="video_summary">video</option>
        </select>
        <label>top-k</label>
        <input type="number" id="cfg-topk" value="10" min="1" max="20"/>
        <button class="btn-icon" id="btn-prompt-toggle" onclick="togglePrompt()">⟨/⟩</button>
        <button class="btn-icon danger" onclick="clearChat()">↺ new chat</button>
      </div>

      <div id="send-row">
        <input id="query-input" type="text"
               placeholder="Ask about the portfolio…"
               onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMessage()"/>
        <button class="btn-send" id="btn-send" onclick="sendMessage()">
          <span id="btn-send-label">Send</span>
          <span id="btn-spinner" class="spinner hidden"></span>
        </button>
      </div>
    </div>
  </main>

  <aside id="right">
    <div class="panel-header" id="sheet-handle">
      <span class="dot"></span>
      Retrieved Chunks
      <span id="chunk-count" style="margin-left:auto;color:var(--text-dim);font-size:10px"></span>
    </div>
    <div class="panel-body" id="chunks-pane">
      <div class="chunks-empty">Chunks will appear after a query.</div>
    </div>
  </aside>

</div>
<div id="toast"></div>

<script>
const API = 'https://profile-rag.onrender.com';

const DEFAULT_SYSTEM_PROMPT = `You are Bhagwan Choudary. Answer questions related to your portfolio.
Some stuff about you:
Bhagwan Chowdhry is a Professor of Finance at the Indian School of Business and Research Professor at UCLA Anderson where he has held an appointment since 1988. He is the Executive Director, Digital Identity Research Initiative (DIRI), and Faculty Director, I-Venture @ ISB.

Professor Chowdhry has also taught at the University of Chicago, University of Illinois at Chicago, and the Hong Kong University of Science and Technology. He received his Ph.D. from the University of Chicago Booth School of Business. He has an M.B.A. in Finance from the University of Iowa and a B.Tech. in Mechanical Engineering from Indian Institute of Technology, Kanpur.

His research interests are in International Finance, Corporate Finance, Impact Investing, and FinTech. Professor Chowdhry is an Advisor to several FinTech start-ups.

He has written a book with his colleague Anas Ahmed at DIRI, FinTech for Billions: Simple, Human, Ubiquitous.

Professor Chowdhry has proposed Financial Access at Birth (FAB) initiative in which every child born in the world is given an initial deposit of $100 in an online bank account.

Rules:
- Answer ONLY from the provided context.
- If the answer is not in context, say so clearly. Do not use the word "context" in your responses.
- Remember the conversation history and refer back to previous answers when relevant.
- Be concise but complete.`;

// Session id — one per tab, reset on "new chat"
let SESSION_ID = crypto.randomUUID();

// Mobile sheet
function isMobile() { return window.innerWidth < 768; }
function openChunks()  { document.getElementById('right').classList.add('open'); document.getElementById('sheet-overlay').classList.add('open'); }
function closeChunks() { document.getElementById('right').classList.remove('open'); document.getElementById('sheet-overlay').classList.remove('open'); }
document.getElementById('sheet-handle').addEventListener('click', () => { if (isMobile()) closeChunks(); });
(function(){
  let sy = 0;
  const s = document.getElementById('right');
  s.addEventListener('touchstart', e => { sy = e.touches[0].clientY; }, { passive: true });
  s.addEventListener('touchend',   e => { if (e.changedTouches[0].clientY - sy > 60) closeChunks(); }, { passive: true });
})();

// Stats
async function refreshStats() {
  try {
    const r = await fetch(`${API}/stats`);
    if (!r.ok) { setStatus(false); return; }
    const s = await r.json();
    setStatus(true);
    document.getElementById('stat-chunks').textContent = s.total_chunks ?? '—';
    document.getElementById('stat-docs').textContent   = s.total_documents ?? '—';
  } catch { setStatus(false); }
}
function setStatus(ok) {
  const el = document.getElementById('server-status-text');
  el.textContent = ok ? '● online' : '○ offline';
  document.getElementById('server-status').classList.toggle('live', ok);
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
}

// Prompt toggle
function togglePrompt() {
  const row = document.getElementById('prompt-row');
  const btn = document.getElementById('btn-prompt-toggle');
  row.classList.toggle('visible');
  btn.classList.toggle('active', row.classList.contains('visible'));
}

// Clear / new chat
async function clearChat() {
  try { await fetch(`${API}/sessions/${SESSION_ID}`, { method: 'DELETE' }); } catch {}
  SESSION_ID = crypto.randomUUID();
  const thread = document.getElementById('thread');
  thread.innerHTML = `<div class="thread-empty" id="thread-empty">
    <div class="big">◈</div>
    <p>Start a conversation about the portfolio.</p>
  </div>`;
  clearChunks();
  log('');
  toast('New conversation started', 'info');
}

// Busy state
function setBusy(busy) {
  document.getElementById('btn-send').disabled    = busy;
  document.getElementById('query-input').disabled = busy;
  document.getElementById('btn-send-label').textContent = busy ? '…' : 'Send';
  document.getElementById('btn-spinner').classList.toggle('hidden', !busy);
}

// Send message
async function sendMessage() {
  const question = document.getElementById('query-input').value.trim();
  if (!question) return;
  document.getElementById('query-input').value = '';
  document.getElementById('query-input').blur();

  const emptyEl = document.getElementById('thread-empty');
  if (emptyEl) emptyEl.remove();

  setBusy(true);
  clearChunks();
  log('Retrieving…');

  const thread = document.getElementById('thread');

  // User bubble
  const userTurn = document.createElement('div');
  userTurn.className = 'turn';
  userTurn.innerHTML = `<div class="bubble-user">${escapeHtml(question)}</div>`;
  thread.appendChild(userTurn);

  // Assistant bubble
  const asstTurn = document.createElement('div');
  asstTurn.className = 'turn';
  asstTurn.innerHTML = `
    <div class="bubble-assistant">
      <div class="bubble-assistant-inner">
        <div class="bubble-text" id="current-bubble"><span class="cursor"></span></div>
        <div class="bubble-meta" id="current-meta"></div>
      </div>
    </div>`;
  thread.appendChild(asstTurn);
  scrollThread();

  const params = new URLSearchParams({
    question,
    session_id:    SESSION_ID,
    top_k:         document.getElementById('cfg-topk').value,
    gemini_model:  document.getElementById('cfg-model').value,
    system_prompt: document.getElementById('cfg-system-prompt').value.trim() || DEFAULT_SYSTEM_PROMPT,
    ...(document.getElementById('cfg-section').value  && { section_filter:  document.getElementById('cfg-section').value }),
    ...(document.getElementById('cfg-doctype').value  && { doc_type_filter: document.getElementById('cfg-doctype').value }),
  });

  const textEl = document.getElementById('current-bubble');
  let fullText = '';

  try {
    const es = new EventSource(`${API}/query/stream?${params}`);

    es.addEventListener('chunk', e => { renderChunk(JSON.parse(e.data)); });

    es.addEventListener('token', e => {
      fullText += JSON.parse(e.data);
      textEl.innerHTML = renderMd(fullText);
      applyKatex(textEl);
      const cur = document.createElement('span');
      cur.className = 'cursor';
      textEl.appendChild(cur);
      scrollThread();
    });

    es.addEventListener('done', e => {
      const meta = JSON.parse(e.data);
      textEl.innerHTML = renderMd(fullText);
      applyKatex(textEl);
      renderBubbleMeta(document.getElementById('current-meta'), meta);
      textEl.removeAttribute('id');
      document.getElementById('current-meta')?.removeAttribute('id');
      log(`Done — ${meta.tokens_used ?? '?'} tokens`);
      setBusy(false);
      es.close();
      if (isMobile() && chunkCount > 0) {
        const btn = document.getElementById('btn-chunks-toggle');
        btn.style.borderColor = 'var(--blue)';
        btn.style.color = 'var(--blue)';
      }
    });

    es.addEventListener('error', e => {
      const msg = e.data ? JSON.parse(e.data) : 'Stream error';
      toast(msg, 'error');
      log('Error: ' + msg);
      textEl.innerHTML = fullText ? renderMd(fullText) : '<em style="color:var(--red)">Error</em>';
      applyKatex(textEl);
      textEl.removeAttribute('id');
      setBusy(false);
      es.close();
    });

    es.onerror = () => {
      if (es.readyState === EventSource.CLOSED) return;
      toast('Connection lost', 'error');
      setBusy(false);
      es.close();
    };
  } catch(e) {
    toast('Query failed: ' + e.message, 'error');
    setBusy(false);
  }
}

function scrollThread() {
  const t = document.getElementById('thread');
  t.scrollTop = t.scrollHeight;
}

// Chunks
let chunkCount = 0;
function clearChunks() {
  chunkCount = 0;
  document.getElementById('chunks-pane').innerHTML = '<div class="chunks-empty">Retrieving…</div>';
  document.getElementById('chunk-count').textContent = '';
  document.getElementById('mobile-chunk-badge').textContent = '0';
  const btn = document.getElementById('btn-chunks-toggle');
  btn.style.borderColor = ''; btn.style.color = '';
}
function renderChunk(c) {
  const pane = document.getElementById('chunks-pane');
  if (chunkCount === 0) pane.innerHTML = '';
  chunkCount++;
  document.getElementById('chunk-count').textContent = `${chunkCount}`;
  document.getElementById('mobile-chunk-badge').textContent = chunkCount;
  const typeClass = c.doc_type === 'video_summary' ? 'video' : c.doc_type === 'index' ? 'index' : '';
  const scorePct  = Math.round(Math.min(c.score, 1) * 100);
  const card = document.createElement('div');
  card.className = 'chunk-card';
  card.style.animationDelay = `${(chunkCount-1)*60}ms`;
  card.innerHTML = `
    <div class="chunk-head">
      <div class="chunk-rank">#${c.rank}</div>
      <div class="chunk-meta">
        <div class="chunk-title" title="${escapeAttr(c.doc_title)}">${escapeHtml(c.doc_title)}</div>
        <div class="chunk-tags">
          <span class="tag tag-section">${escapeHtml(c.section)}</span>
          <span class="tag tag-type ${typeClass}">${escapeHtml(c.doc_type)}</span>
        </div>
      </div>
      <div>
        <div class="chunk-score">${c.score.toFixed(3)}</div>
        <div class="score-bar"><div class="score-fill" style="width:${scorePct}%"></div></div>
      </div>
    </div>
    <div class="chunk-body" id="cb-${chunkCount}">${escapeHtml(c.raw_content)}</div>
    <button class="chunk-toggle" onclick="toggleChunk(${chunkCount})">▾ show content</button>`;
  pane.appendChild(card);
}
function toggleChunk(n) {
  const b = document.getElementById(`cb-${n}`);
  const o = b.classList.toggle('open');
  b.nextElementSibling.textContent = o ? '▴ hide' : '▾ show content';
}

function renderBubbleMeta(el, meta) {
  if (!el) return;
  const sources = (meta.sources || [])
    .map(s => `<a href="${escapeAttr(s.doc_url||'#')}" target="_blank" style="color:var(--blue);text-decoration:none" title="${escapeAttr(s.doc_title)}">[${s.doc_index}]</a>`)
    .join(' ');
  el.innerHTML = `
    <div class="mi"><span>tokens</span><span class="mv">${meta.tokens_used ?? '—'}</span></div>
    <div class="mi"><span>sources</span><span class="mv">${sources || '—'}</span></div>`;
}

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = `${type==='success'?'✓':type==='error'?'✕':'◈'}  ${msg}`;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3800);
}
function log(msg) { document.getElementById('progress-log').textContent = msg; }
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escapeAttr(s) { return String(s||'').replace(/"/g,'&quot;'); }

document.getElementById('cfg-system-prompt').value = DEFAULT_SYSTEM_PROMPT;
refreshStats();
setInterval(refreshStats, 8000);

/* ── Markdown + LaTeX pipeline ─────────────────────────────────────────────
 *
 * Problem: marked.parse() mangles LaTeX delimiters before KaTeX sees them.
 *   - Backslashes get escaped  (\( becomes \\()
 *   - Underscores become <em>  (x_i becomes x<em>i)
 *
 * Fix: extract every LaTeX block FIRST (replace with opaque placeholders),
 * let marked parse the clean markdown, then restore raw LaTeX into
 * <span data-latex> elements that katex.renderToString() handles safely.
 * ────────────────────────────────────────────────────────────────────── */
/* ── Markdown + LaTeX pipeline ────────────────────────────────────────────────
 *
 * marked.parse() mangles LaTeX before KaTeX ever sees it:
 *   - Backslashes get escaped:   \( → \\(
 *   - Underscores become <em>:   x_i → x<em>i</em>
 *   - Dollar signs trigger code spans
 *
 * Fix: stash every LaTeX block as an opaque placeholder BEFORE marked runs,
 * then restore each one as a <span data-raw="..."> that katex.renderToString
 * can safely process — completely bypassing the marked pipeline.
 * ─────────────────────────────────────────────────────────────────────────── */
function renderMd(text) {
  const stash = [];

  function hide(raw, display) {
    const id = '\x02' + stash.length + '\x03';
    stash.push({ id, raw, display });
    return id;
  }

  // Extract in priority order — longest/greediest delimiters first
  // 1. $$...$$ display (multiline OK)
  let s = text.replace(/\$\$([\s\S]+?)\$\$/g,   (_, m) => hide('$$' + m + '$$', true));
  // 2. \[...\] display (multiline OK)
  s = s.replace(/\\\[([\s\S]+?)\\\]/g,           (_, m) => hide('\\[' + m + '\\]', true));
  // 3. \(...\) inline
  s = s.replace(/\\\(([\s\S]+?)\\\)/g,           (_, m) => hide('\\(' + m + '\\)', false));
  // 4. $...$ inline — single line, non-space at both boundaries
  s = s.replace(/\$([^\s$\n][^$\n]*?[^\s$\n]|\S)\$/g, (_, m) => hide('$' + m + '$', false));

  // marked runs on LaTeX-free text — no mangling possible
  let html = marked.parse(s, { breaks: true, gfm: true });

  // Restore as data-attribute spans; katex.renderToString will fill them in
  for (const { id, raw, display } of stash) {
    const esc = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;')
                   .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    html = html.replace(id,
      `<span class="latex-pending" data-display="${display}" data-raw="${esc}"></span>`);
  }
  return html;
}

function applyKatex(el) {
  el.querySelectorAll('span.latex-pending').forEach(span => {
    const display = span.dataset.display === 'true';
    const raw = span.dataset.raw
      .replace(/&amp;/g,'&').replace(/&lt;/g,'<')
      .replace(/&gt;/g,'>').replace(/&quot;/g,'"');
    // Strip outer delimiters — KaTeX wants bare LaTeX source
    const inner = raw
      .replace(/^\$\$([\s\S]*)\$\$$/, '$1')
      .replace(/^\\\[([\s\S]*)\\\]$/, '$1')
      .replace(/^\\\(([\s\S]*)\\\)$/, '$1')
      .replace(/^\$([\s\S]*)\$$/, '$1');
    try {
      span.outerHTML = katex.renderToString(inner, {
        displayMode: display,
        throwOnError: false,
        trust: false,
      });
    } catch(e) {
      span.textContent = raw;
      span.className = 'latex-error';
    }
  });
}
